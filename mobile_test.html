<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuesday League | Mobile Entry</title>
   <style>
    body, html { 
        margin: 0; padding: 0; min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #121212; color: white;
        /* Using your photo, but adjusting so more shows on phones */
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Web_Site/WFSSC_Hall.jpg');
        background-size: cover; background-position: center; background-attachment: fixed;
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        padding-top: 50px; /* Moves everything down so you see the top of the hall */
    }
    .container { 
        background: rgba(0, 0, 0, 0.7); /* More transparent so the photo shows through */
        padding: 30px; border-radius: 20px;
        border: 1px solid rgba(0, 123, 255, 0.5); 
        max-width: 85%; width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        backdrop-filter: blur(8px); /* Blur behind the box to make it look modern */
    }
    h2 { margin: 0 0 5px; color: #007bff; text-transform: uppercase; letter-spacing: 2px; }
    .subtitle { color: #ccc; font-size: 0.9em; margin-bottom: 25px; }

    /* Form Elements */
    select, input { 
        width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
        border: 1px solid #444; background: rgba(50, 50, 50, 0.8); color: white; font-size: 16px;
        box-sizing: border-box;
    }
    button { 
        background: #007bff; color: white; padding: 15px; border: none;
        border-radius: 10px; font-size: 16px; font-weight: bold;
        width: 100%; cursor: pointer; margin-top: 10px;
        transition: transform 0.2s, background 0.2s;
    }
    button:active { transform: scale(0.98); background: #0056b3; }

    /* Score Entry Grid (Responsively stacks) */
    .score-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; text-align: left; }
    .input-group { flex: 1; min-width: 110px; }
    .input-group label { display: block; font-size: 0.8em; color: #ccc; margin-bottom: 5px; }

    .status { color: #ffbc00; margin-top: 20px; font-size: 0.8em; font-weight: bold; }

    /* Extra padding for phone landscape so it doesn't touch the edges */
    @media (max-width: 900px) {
        .container { padding: 20px; width: 90%; }
        body { padding-top: 30px; }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Tuesday League</h2>
    <div class="subtitle">West Fife Community Sports Club</div>
    
    <div id="loginSection">
        <select id="tableSelect">
            <option>Table 1</option>
            <option>Table 2</option>
            <option>Table 3</option>
        </select>
        <input type="password" id="passwordInput" placeholder="Enter Password" inputmode="numeric">
        <button onclick="testLogin()">LOGIN</button>
    </div>

    <!-- Hidden until login success -->
    <div id="scoreSection" style="display:none;">
        <div class="score-row">
            <div class="input-group">
                <label>Player 1 (G1)</label>
                <input type="number" id="p1g1" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Player 2 (G1)</label>
                <input type="number" id="p2g1" inputmode="numeric">
            </div>
        </div>
        <button onclick="alert('Sending to Google Sheets...')">SUBMIT SCORES</button>
    </div>

    <div id="status" class="status">Waiting for login...</div>
</div>

<script>
    // MAKE SURE TO PASTE YOUR REAL GOOGLE URL BELOW
    const WEB_APP_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

    function testLogin() {
        const pass = document.getElementById('passwordInput').value;
        const status = document.getElementById('status');
        
        status.innerText = "Connecting...";
        
        // Dummy test password
        if(pass === "1234") {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('scoreSection').style.display = "block";
            status.innerText = "Login Success!";
        } else {
            status.innerText = "Login Failed! (Try 1234)";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | TableTennisApp</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0; background: #231F20;">
    <!-- Removed the hardcoded style width/height from here -->
    <canvas id="unity-canvas" width=1280 height=768 tabindex="-1" style="background: #231F20"></canvas>
    <script src="Build/TableTennisWebBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // --- MOBILE STYLE (Kept exactly as you had it) ---
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        document.body.style.textAlign = "left";

      } else {
        // --- PC/DESKTOP STYLE (The Fix) ---
        // This makes the game fill the browser window while keeping aspect ratio
        canvas.style.width = "100vw";
        canvas.style.height = "100vh";
        canvas.style.display = "block";
        canvas.style.objectFit = "contain";
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/TableTennisWebBuild.data.unityweb",
        frameworkUrl: "Build/TableTennisWebBuild.framework.js.unityweb",
        codeUrl: "Build/TableTennisWebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Wozatronics",
        productName: "TableTennisApp",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
